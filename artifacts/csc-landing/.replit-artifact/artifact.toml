kind = "web"
previewPath = "/"
title = "CSC Balasore Landing Page"
version = "1.0.0"
id = "artifacts/csc-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21740

[services.development]
run = "pnpm --filter @workspace/csc-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/csc-landing", "run", "build" ]
publicDir = "artifacts/csc-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21740"
BASE_PATH = "/"
